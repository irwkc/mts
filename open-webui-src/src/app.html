<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/static/favicon.png" crossorigin="use-credentials" />
		<link
			rel="icon"
			type="image/png"
			href="/static/favicon-96x96.png"
			sizes="96x96"
			crossorigin="use-credentials"
		/>
		<link
			rel="icon"
			type="image/svg+xml"
			href="/static/favicon.svg"
			crossorigin="use-credentials"
		/>
		<link rel="shortcut icon" href="/static/favicon.ico" crossorigin="use-credentials" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="/static/apple-touch-icon.png"
			crossorigin="use-credentials"
		/>
		<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#171717" />
		<meta name="robots" content="noindex,nofollow" />

		<script src="/static/loader.js" defer crossorigin="use-credentials"></script>
		<link rel="stylesheet" href="/static/custom.css" crossorigin="use-credentials" />

		<script>
			function resizeIframe(obj) {
				obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
			}
		</script>

		<script>
			// On page load or when changing themes, best to add inline in `head` to avoid FOUC
			(() => {
				const metaThemeColorTag = document.querySelector('meta[name="theme-color"]');
				const prefersDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

				if (!localStorage?.theme) {
					localStorage.theme = 'system';
				}

				if (localStorage.theme === 'system') {
					document.documentElement.classList.add(prefersDarkTheme ? 'dark' : 'light');
					metaThemeColorTag.setAttribute('content', prefersDarkTheme ? '#171717' : '#ffffff');
				} else if (localStorage.theme === 'oled-dark') {
					document.documentElement.style.setProperty('--color-gray-800', '#101010');
					document.documentElement.style.setProperty('--color-gray-850', '#050505');
					document.documentElement.style.setProperty('--color-gray-900', '#000000');
					document.documentElement.style.setProperty('--color-gray-950', '#000000');
					document.documentElement.classList.add('dark');
					metaThemeColorTag.setAttribute('content', '#000000');
				} else if (localStorage.theme === 'light') {
					document.documentElement.classList.add('light');
					metaThemeColorTag.setAttribute('content', '#ffffff');
				} else if (localStorage.theme === 'her') {
					document.documentElement.classList.add('her');
					metaThemeColorTag.setAttribute('content', '#983724');
				} else {
					document.documentElement.classList.add('dark');
					metaThemeColorTag.setAttribute('content', '#171717');
				}

				window.matchMedia('(prefers-color-scheme: dark)').addListener((e) => {
					if (localStorage.theme === 'system') {
						if (e.matches) {
							document.documentElement.classList.add('dark');
							document.documentElement.classList.remove('light');
							metaThemeColorTag.setAttribute('content', '#171717');
						} else {
							document.documentElement.classList.add('light');
							document.documentElement.classList.remove('dark');
							metaThemeColorTag.setAttribute('content', '#ffffff');
						}
					}
				});
			})();
		</script>

		<title>Open WebUI</title>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<div id="splash-screen">
			<style type="text/css" nonce="">
				html {
					overflow-y: scroll !important;
				}
			</style>

			<!-- src задаётся скриптом: корневой /static/… ломается при paths.base и подпутях nginx -->
			<img id="splash-logo" alt="" decoding="async" fetchpriority="high" />

			<div id="her-splash-wrap">
				<img id="logo-her" alt="" class="animate-pulse-fast" decoding="async" fetchpriority="high" />

				<div id="her-progress-row">
					<div id="progress-background"></div>
					<div id="progress-bar" class="bg-white"></div>
				</div>
			</div>

			<script>
				(function () {
					function staticUrl(name) {
						var b = document.querySelector('base[href]');
						if (b && b.href) {
							try {
								return new URL('static/' + name, b.href).href;
							} catch (e) {}
						}
						return '/static/' + name;
					}
					var h = document.documentElement;
					var fav = staticUrl('favicon.png');
					var sp = staticUrl('splash.png');
					var spDark = staticUrl('splash-dark.png');

					if (h.classList.contains('her')) {
						var lh = document.getElementById('logo-her');
						if (lh) {
							lh.src = sp;
							lh.onerror = function () {
								this.onerror = null;
								this.src = fav;
							};
						}
						return;
					}
					var el = document.getElementById('splash-logo');
					if (!el) return;
					el.src = h.classList.contains('dark') ? spDark : sp;
					el.onerror = function () {
						this.onerror = null;
						this.src = fav;
					};
				})();
			</script>
		</div>
	</body>

	<style type="text/css" nonce="">
		html {
			overflow-y: hidden !important;
			overscroll-behavior-y: none;
		}

		/* Фон сплэша переопределяется в /static/custom.css (BAOBAB). Здесь — только раскладка и z-index. */
		#splash-screen {
			position: fixed;
			z-index: 2147483000;
			inset: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 1rem;
			box-sizing: border-box;
			padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right))
				max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
			isolation: isolate;
		}

		#splash-logo {
			width: auto;
			height: clamp(4.5rem, 15vh, 7.5rem);
			max-width: min(88vw, 20rem);
			object-fit: contain;
			display: none;
			filter: drop-shadow(0 4px 24px rgba(0, 0, 0, 0.12));
		}

		html.dark #splash-logo {
			filter: drop-shadow(0 4px 32px rgba(0, 0, 0, 0.45));
		}

		html:not(.her) #splash-logo {
			display: block;
		}

		#her-splash-wrap {
			display: none;
			flex-direction: column;
			align-items: center;
			width: min(24rem, 100%);
		}

		html.her #splash-logo {
			display: none;
		}

		html.her #her-splash-wrap {
			display: flex;
		}

		html.her #splash-screen {
			background: #983724;
		}

		#logo-her {
			width: auto;
			height: 13rem;
			max-width: 100%;
			object-fit: contain;
			filter: drop-shadow(0 2px 16px rgba(0, 0, 0, 0.25));
		}

		#her-progress-row {
			position: relative;
			width: 100%;
			margin-top: 0.5rem;
			height: 0.75rem;
		}

		#progress-background {
			display: none;
			position: absolute;
			width: 100%;
			height: 0.75rem;
			border-radius: 9999px;
			background-color: #fafafa9a;
		}

		#progress-bar {
			display: none;
			position: absolute;
			width: 0%;
			height: 0.75rem;
			border-radius: 9999px;
			background-color: #fff;
		}

		html.her #progress-background {
			display: block;
		}

		html.her #progress-bar {
			display: block;
		}

		@media (max-width: 24rem) {
			html.her #progress-background {
				display: none;
			}

			html.her #progress-bar {
				display: none;
			}
		}

		@keyframes pulse {
			50% {
				opacity: 0.65;
			}
		}

		.animate-pulse-fast {
			animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
		}
	</style>
</html>
