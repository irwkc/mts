# Автодеплой на сервер по SSH при push в main (и вручную).
# В репозитории: Settings → Secrets and variables → Actions:
#   DEPLOY_HOST       — IP или hostname (например 195.209.216.222)
#   DEPLOY_USER       — пользователь SSH (например ubuntuuser)
#   DEPLOY_SSH_KEY    — приватный ключ (весь PEM, включая BEGIN/END)
#
# На сервере один раз: git clone, .env из .env.example, sudo docker compose up -d --build

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mts
            git fetch origin main
            git reset --hard origin/main
            sudo docker compose up -d --build
