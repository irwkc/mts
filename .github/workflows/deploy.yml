# Автодеплой на сервер по SSH при push в main (и вручную).
# Секреты (Settings → Secrets and variables → Actions):
#   SSH_HOST, SSH_USER, SSH_PASSWORD
#
# На сервере один раз: git clone в ~/mts, .env из .env.example, docker compose up -d --build

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          # По умолчанию drone-ssh обрывает команду через ~10m — pull Open WebUI не успевает
          command_timeout: 90m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mts
            git fetch origin main
            git reset --hard origin/main
            sudo docker compose up -d --build
