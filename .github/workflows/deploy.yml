# Сборка образа gpthub-gateway в Actions (кэш BuildKit GHA) → push в GHCR → на сервере только pull + up.
# Секреты: SSH_HOST, SSH_USER, SSH_PASSWORD
# Пакет ghcr.io/.../gpthub-gateway должен быть Public или на сервере: docker login ghcr.io

name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mts-gpthub-gateway
  IMAGE_OPENWEBUI: mts-open-webui-baobab

jobs:
  # Два образа собираются параллельно — суммарное время CI ближе к max(оба), а не к сумме.
  build-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gpthub-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gpthub-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-openwebui:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Open WebUI (fork + BAOBAB)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./open-webui-baobab/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_OPENWEBUI }}:latest
          build-args: BUILD_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-gateway, build-openwebui]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mts
            git fetch origin main
            git reset --hard origin/main
            sudo bash gpthub-gateway/scripts/cleanup-server-disk.sh || true
            pull_ok=0
            for attempt in 1 2 3 4 5; do
              if sudo docker compose pull; then
                pull_ok=1
                break
              fi
              echo "docker compose pull failed ($attempt/5), retry in 45s (GHCR TLS/network)..."
              sleep 45
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "GHCR still unreachable; building gpthub-gateway on server (fallback, slower)"
              sudo docker compose build gpthub-gateway
            fi
            sudo docker compose up -d --force-recreate
            sudo bash scripts/setup-nginx.sh
            sudo bash scripts/install-boot-autostart.sh
