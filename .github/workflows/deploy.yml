name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mts-gpthub-gateway
  IMAGE_OPENWEBUI: mts-open-webui-baobab

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      openwebui: ${{ steps.filter.outputs.openwebui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gpthub-gateway/**'
            openwebui:
              - 'open-webui-src/**'
              - 'open-webui-baobab/**'

  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gpthub-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gpthub-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-openwebui:
    needs: changes
    if: needs.changes.outputs.openwebui == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Open WebUI (fork + BAOBAB)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./open-webui-baobab/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_OPENWEBUI }}:latest
          build-args: BUILD_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, build-gateway, build-openwebui]
    if: >
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-gateway.result == 'success' || needs.build-gateway.result == 'skipped') &&
      (needs.build-openwebui.result == 'success' || needs.build-openwebui.result == 'skipped') &&
      needs.build-gateway.result != 'failure' &&
      needs.build-openwebui.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 55m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mts
            git fetch origin main
            git reset --hard origin/main
            sudo docker compose down --remove-orphans || true
            sudo env DEPLOY_QUICK_CLEAN=1 bash gpthub-gateway/scripts/cleanup-server-disk.sh || true
            echo "=== df before pull ==="
            df -h / || true
            export COMPOSE_PARALLEL_LIMIT=1
            pull_ok=0
            for attempt in 1 2 3 4 5; do
              if sudo env COMPOSE_HTTP_TIMEOUT=300 DOCKER_CLIENT_TIMEOUT=300 docker compose pull chroma && \
                 sudo env COMPOSE_HTTP_TIMEOUT=300 DOCKER_CLIENT_TIMEOUT=300 docker compose pull gpthub-gateway && \
                 sudo env COMPOSE_HTTP_TIMEOUT=300 DOCKER_CLIENT_TIMEOUT=300 docker compose pull open-webui; then
                pull_ok=1
                break
              fi
              echo "docker compose pull failed ($attempt/5), retry in 45s (GHCR TLS/network)..."
              df -h / || true
              sleep 45
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "GHCR still unreachable; building gpthub-gateway on server (fallback, slower)"
              sudo env COMPOSE_HTTP_TIMEOUT=300 DOCKER_CLIENT_TIMEOUT=300 docker compose build gpthub-gateway
            fi
            sudo env COMPOSE_HTTP_TIMEOUT=300 DOCKER_CLIENT_TIMEOUT=300 docker compose up -d --force-recreate
            sudo bash scripts/setup-nginx.sh
            sudo env MTS_HOME="$(pwd)" bash scripts/install-boot-autostart.sh
