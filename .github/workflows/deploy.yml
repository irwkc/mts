# Сборка образа gpthub-gateway в Actions (кэш BuildKit GHA) → push в GHCR → на сервере только pull + up.
# Секреты: SSH_HOST, SSH_USER, SSH_PASSWORD
# Пакет ghcr.io/.../gpthub-gateway должен быть Public или на сервере: docker login ghcr.io

name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mts-gpthub-gateway
  IMAGE_OPENWEBUI: mts-open-webui-baobab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gpthub-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gpthub-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Open WebUI (BAOBAB theme)
        uses: docker/build-push-action@v6
        with:
          context: ./open-webui-baobab
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_OPENWEBUI }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 25m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mts
            git fetch origin main
            git reset --hard origin/main
            sudo bash gpthub-gateway/scripts/cleanup-server-disk.sh || true
            sudo docker compose pull
            sudo docker compose up -d --no-build --force-recreate
            sudo bash scripts/setup-nginx.sh
            sudo bash scripts/install-boot-autostart.sh
