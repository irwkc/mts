# Сборка образа gpthub-gateway в Actions (кэш BuildKit GHA) → push в GHCR → на сервере только pull + up.
#
# Секреты (Settings → Secrets and variables → Actions):
#   SSH_HOST     — IP или hostname сервера
#   SSH_USER     — логин Linux, тот же что для ручного ssh (если переименовали пользователя — обновите секрет)
#   SSH_PASSWORD — пароль; без кавычек и без лишнего переноса строки в конце
# Ошибка deploy: «handshake failed … password» — неверные SSH_USER/SSH_PASSWORD или парольный вход запрещён sshd.
# Ключ вместо пароля: appleboy/ssh-action принимает либо password, либо key (не оба) — см. README.
#
# Пакет ghcr.io/.../gpthub-gateway должен быть Public или на сервере: docker login ghcr.io
#
# Open WebUI (~7 min npm+build) и gateway собираются только если менялись соответствующие пути.
# Ручной прогон «как раньше, всё подряд»: Actions → Build and deploy → Run workflow.

name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mts-gpthub-gateway
  IMAGE_OPENWEBUI: mts-open-webui-baobab

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      openwebui: ${{ steps.filter.outputs.openwebui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gpthub-gateway/**'
            openwebui:
              - 'open-webui-src/**'
              - 'open-webui-baobab/**'

  # Два образа — параллельно; на push только при изменениях в соответствующих путях.
  # workflow_dispatch: всегда собираем оба образа (полный прогон).
  build-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gpthub-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gpthub-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-openwebui:
    needs: changes
    if: needs.changes.outputs.openwebui == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Open WebUI (fork + BAOBAB)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./open-webui-baobab/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_OPENWEBUI }}:latest
          build-args: BUILD_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, build-gateway, build-openwebui]
    # Пропущенная сборка (нет изменений в путях) — не считается ошибкой.
    if: >
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-gateway.result == 'success' || needs.build-gateway.result == 'skipped') &&
      (needs.build-openwebui.result == 'success' || needs.build-openwebui.result == 'skipped') &&
      needs.build-gateway.result != 'failure' &&
      needs.build-openwebui.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 40m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/mts
            git fetch origin main
            git reset --hard origin/main
            # Остановить стек: иначе старые слои заняты, prune не освобождает место под новый pull (libtorch и т.д.)
            sudo docker compose down --remove-orphans || true
            sudo bash gpthub-gateway/scripts/cleanup-server-disk.sh || true
            pull_ok=0
            for attempt in 1 2 3 4 5; do
              if sudo docker compose pull; then
                pull_ok=1
                break
              fi
              echo "docker compose pull failed ($attempt/5), retry in 45s (GHCR TLS/network)..."
              sleep 45
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "GHCR still unreachable; building gpthub-gateway on server (fallback, slower)"
              sudo docker compose build gpthub-gateway
            fi
            sudo docker compose up -d --force-recreate
            sudo bash scripts/setup-nginx.sh
            sudo env MTS_HOME="$(pwd)" bash scripts/install-boot-autostart.sh
