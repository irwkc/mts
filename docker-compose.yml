services:
  chroma:
    image: chromadb/chroma:latest
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chroma-data:/data
    restart: unless-stopped

  gpthub-gateway:
    image: ${GPTHUB_IMAGE:-ghcr.io/irwkc/mts-gpthub-gateway:latest}
    build:
      context: ./gpthub-gateway
      dockerfile: Dockerfile
    depends_on:
      chroma:
        condition: service_started
    environment:
      MWS_API_BASE: ${MWS_API_BASE:-https://api.gpt.mws.ru/v1}
      MWS_API_KEY: ${MWS_API_KEY:?set MWS_API_KEY in .env}
      # Если у ключа MWS нет TTS в каталоге и MWS отдаёт 5xx — true даёт тихий MP3 (200) вместо 502 (см. GPTHUB_TTS_FALLBACK_ON_DENIAL для 401/403).
      GPTHUB_TTS_FALLBACK_ON_5XX: ${GPTHUB_TTS_FALLBACK_ON_5XX:-false}
      # Распознавание речи (Whisper): ru стабильнее для русской речи, если клиент не передал language
      GPTHUB_ASR_DEFAULT_LANGUAGE: ${GPTHUB_ASR_DEFAULT_LANGUAGE:-ru}
      # Опционально: если MWS не принимает tts-1/alloy, задайте свои id (см. GET /v1/models и логи шлюза при ошибке TTS).
      # GPTHUB_TTS_MODEL:
      # GPTHUB_TTS_VOICE:
      # Дефолты как в PDF MWS GPT (разд. 5): mws-gpt-alpha — основной диалог; см. GET /v1/models
      DEFAULT_LLM: ${DEFAULT_LLM:-mws-gpt-alpha}
      VISION_MODEL: ${VISION_MODEL:-cotype-pro-vl-32b}
      GPTHUB_MEMORY_DIGEST_MODEL: ${GPTHUB_MEMORY_DIGEST_MODEL:-mws-gpt-alpha}
      IMAGE_GEN_MODEL: ${IMAGE_GEN_MODEL:-qwen-image}
      ASR_MODEL: ${ASR_MODEL:-whisper-medium}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      GPTHUB_ROUTER_DEBUG: ${GPTHUB_ROUTER_DEBUG:-true}
      GPTHUB_ROUTER_MODE: ${GPTHUB_ROUTER_MODE:-gena}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      GPTHUB_PUBLIC_BASE_URL: ${GPTHUB_PUBLIC_BASE_URL:-http://127.0.0.1:8081}
      GPTHUB_GENA_CODE_MODEL: ${GPTHUB_GENA_CODE_MODEL:-qwen3-coder-480b-a35b}
      GPTHUB_GENA_LONG_DOC_MODEL: ${GPTHUB_GENA_LONG_DOC_MODEL:-cotype-pro-vl-32b}
      GPTHUB_GENA_CHAT_MODEL: ${GPTHUB_GENA_CHAT_MODEL:-mws-gpt-alpha}
      GPTHUB_SIMPLE_CHAT_MODEL: ${GPTHUB_SIMPLE_CHAT_MODEL:-}
      GPTHUB_AUTO_MODEL_DISPLAY_NAME: "${GPTHUB_AUTO_MODEL_DISPLAY_NAME:-gena 2.0}"
      GPTHUB_LOG_LEVEL: ${GPTHUB_LOG_LEVEL:-DEBUG}
    volumes:
      - gpthub-data:/data
    shm_size: "256mb"
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s

  open-webui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/irwkc/mts-open-webui:latest}
    build:
      context: ./open-webui-src
      dockerfile: Dockerfile
      args:
        BUILD_HASH: ${BUILD_HASH:-dev}
        # true: подставить ./build с хоста (cd open-webui-src && npm run build), без vite в Docker — меньше OOM
        USE_PREBUILT_FRONTEND: ${USE_PREBUILT_FRONTEND:-false}
    depends_on:
      gpthub-gateway:
        condition: service_healthy
    ports:
      - "3000:8080"
    environment:
      ENABLE_PERSISTENT_CONFIG: "false"
      GLOBAL_LOG_LEVEL: ${GLOBAL_LOG_LEVEL:-DEBUG}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-gpthub-change-me-in-production}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL:-test@mail.ru}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD:-123}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME:-Test}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-user}
      WEBUI_AUTH: ${WEBUI_AUTH:-true}
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      # Иначе у role=user модели с внешнего API (gpthub-auto и др.) отфильтровываются → «Model not found».
      BYPASS_MODEL_ACCESS_CONTROL: "true"
      # Несколько бэкендов: в .env задайте OPENAI_API_BASE_URLS и OPENAI_API_KEYS через «;» (порядок пар должен совпадать).
      # Пример с Grok: OPENAI_API_BASE_URLS=http://gpthub-gateway:8080/v1;https://api.x.ai/v1 и OPENAI_API_KEYS=mws-ключ;xai-ключ
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://gpthub-gateway:8080/v1}
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS:-http://gpthub-gateway:8080/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-${MWS_API_KEY:?set MWS_API_KEY in .env}}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-${MWS_API_KEY:?set MWS_API_KEY in .env}}
      WEBUI_URL: ${WEBUI_URL:-http://localhost:3000}
      WEBUI_NAME: "${WEBUI_NAME:-gena 2.0}"
      DEFAULT_MODELS: '["gpthub-auto"]'
      # Голосовой чат (Voice mode): STT/TTS через шлюз; не «Web STT», иначе звонок отключён в UI
      AUDIO_STT_ENGINE: openai
      AUDIO_STT_OPENAI_API_BASE_URL: http://gpthub-gateway:8080/v1
      AUDIO_STT_OPENAI_API_KEY: ${MWS_API_KEY:?set MWS_API_KEY in .env}
      AUDIO_STT_MODEL: ${ASR_MODEL:-whisper-medium}
      AUDIO_TTS_ENGINE: openai
      AUDIO_TTS_OPENAI_API_BASE_URL: http://gpthub-gateway:8080/v1
      AUDIO_TTS_OPENAI_API_KEY: ${MWS_API_KEY:?set MWS_API_KEY in .env}
      AUDIO_TTS_MODEL: ${AUDIO_TTS_MODEL:-tts-1}
      AUDIO_TTS_VOICE: ${AUDIO_TTS_VOICE:-alloy}
      # Явно разрешаем звонок/распознавание/озвучку для ролей user (не только admin)
      USER_PERMISSIONS_CHAT_CALL: "true"
      USER_PERMISSIONS_CHAT_STT: "true"
      USER_PERMISSIONS_CHAT_TTS: "true"
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 180s

volumes:
  gpthub-data:
  open-webui-data:
  chroma-data:
