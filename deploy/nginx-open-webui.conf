# Скопировать в /etc/nginx/sites-available/mts и включить symlink в sites-enabled.
# upstream — Open WebUI в Docker на localhost:3000
#
# HTTPS не включён по умолчанию (только порт 80). Чтобы заработал https://домен:
#   sudo CERTBOT_EMAIL=you@domain.tld bash scripts/enable-https.sh ваш-домен.tld
# Подробнее: deploy/nginx-open-webui-https.example.conf
#
# Голос / микрофон: без HTTPS (или не localhost) браузер часто блокирует микрофон.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Старт Open WebUI и WebSocket (socket.io)
        proxy_connect_timeout 300s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}
