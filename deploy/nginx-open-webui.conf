# Скопировать в /etc/nginx/sites-available/mts и включить symlink в sites-enabled.
# upstream — Open WebUI в Docker на localhost:3000

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Open WebUI долго стартует — без этого nginx отдаёт 502, пока upstream ещё сбрасывает соединение
        proxy_connect_timeout 300s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_buffering off;
    }
}
