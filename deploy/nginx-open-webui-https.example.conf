# Пример: HTTPS для Open WebUI — иначе браузер блокирует микрофон для голоса/звонка/диктовки
# при открытии с другого устройства по HTTP (нужен «безопасный контекст»).
#
# 1. Установите certbot (Let's Encrypt), получите сертификаты для вашего домена.
# 2. Подставьте server_name и пути к fullchain.pem / privkey.pem.
# 3. WEBUI_URL=https://ваш-домен  в .env, перезапуск: docker compose up -d
#
# Редирект с HTTP на HTTPS:

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 300s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}
